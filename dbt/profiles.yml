# =============================================================================
# dbt Connection Profile — economic_data
# =============================================================================
#
# This file is safe to commit. All credentials are read from environment
# variables via dbt's env_var() function — no secrets are hardcoded here.
#
# The environment variables are injected into the Airflow container by
# docker-compose.yml from the project's .env file:
#   POSTGRES_ETL_USER      → database username
#   POSTGRES_ETL_PASSWORD  → database password
#   POSTGRES_ETL_DB        → database name
#   POSTGRES_ETL_HOST      → database hostname (default: postgres-etl Docker service;
#                            set to RDS endpoint in .env for production)
#
# To run dbt manually inside the container:
#   docker exec airflow_scheduler bash -c \
#     "cd /opt/airflow/dbt && dbt debug --profiles-dir /opt/airflow/dbt"
# =============================================================================

economic_data:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_ETL_HOST', 'postgres-etl') }}"
      port: 5432
      user: "{{ env_var('POSTGRES_ETL_USER') }}"
      password: "{{ env_var('POSTGRES_ETL_PASSWORD') }}"
      dbname: "{{ env_var('POSTGRES_ETL_DB') }}"
      schema: anlytics
      threads: 1
      connect_timeout: 10
