# =============================================================================
# dbt Project — economic_data
# =============================================================================
#
# This dbt project runs inside the Airflow scheduler container after the
# load_economic_data task completes. It reads from the raw tables written
# by the economic-data-etl pipeline and produces analytics-ready views
# and tables in the same postgres-etl database.
#
# Layer Architecture
# ------------------
#   Macro branch
#     Sources (raw, written by ETL):
#       fact_economic_observations  — one row per (series_id, date)
#       dim_series                  — one row per series_id
#     Staging (views in `staging` schema):
#       stg_observations
#       stg_dim_series
#     Marts (tables in `analytics` schema):
#       mart_gdp, mart_inflation, mart_labor_market, mart_economic_summary
#
#   Grocery branch
#     Sources (raw, written by grocery_load_to_postgres):
#       fact_store_metrics, fact_department_metrics, fact_anomaly_flags,
#       dim_stores, dim_calendar, dim_departments
#     Staging (views in `grocery_staging` schema):
#       stg_store_metrics, stg_department_metrics, stg_anomaly_flags
#     Marts (tables in `grocery_analytics` schema):
#       mart_store_metrics, mart_anomalies, mart_dashboard_summary,
#       mart_dim_stores, mart_dim_departments
#
# Running Manually
# ----------------
#   docker exec airflow_scheduler bash -c \
#     "cd /opt/airflow/dbt && dbt run --profiles-dir /opt/airflow/dbt"
#
#   docker exec airflow_scheduler bash -c \
#     "cd /opt/airflow/dbt && dbt test --profiles-dir /opt/airflow/dbt"
# =============================================================================

name: economic_data
version: "1.0.0"
config-version: 2

profile: economic_data

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  economic_data:
    staging:
      # Staging models are views — cheap to query, always up to date.
      # They are the single authoritative source of typed, cleaned data.
      +materialized: view
      +schema: staging

    marts:
      # Mart models are materialized as tables — faster for BI queries
      # and dashboards that scan many rows.
      +materialized: table
      +schema: analytics

    # -------------------------------------------------------------------------
    # Grocery branch
    # -------------------------------------------------------------------------
    # Same view/table convention as the macro side, but lands in a separate
    # pair of schemas (grocery_staging, grocery_analytics) so the data
    # layer is self-documenting — a consumer reading the schema list can
    # tell which platform branch a model belongs to without inspecting
    # individual table names.
    # -------------------------------------------------------------------------
    grocery:
      staging:
        +materialized: view
        +schema: grocery_staging

      marts:
        +materialized: table
        +schema: grocery_analytics
