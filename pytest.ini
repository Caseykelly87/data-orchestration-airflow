[pytest]
# =============================================================================
# data-orchestration-airflow — Pytest Configuration
# =============================================================================

# Test discovery roots
testpaths = tests

# File, class, and function naming conventions
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# Console output: show live log output during test runs
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s

# Short traceback format — sufficient for structural tests
addopts = --tb=short

# Suppress known Airflow deprecation warnings that are not relevant to
# DAG structural tests. Add patterns here as needed to keep output clean.
filterwarnings =
    ignore::DeprecationWarning:airflow
    ignore::PendingDeprecationWarning:airflow
