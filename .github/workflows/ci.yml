# =============================================================================
# data-orchestration-airflow — Continuous Integration
# =============================================================================
#
# Triggers on every push and pull request to main or development.
#
# Jobs
# ----
#   lint-and-test:
#     1. Lint with ruff   — catches syntax errors, undefined names, unused
#                           imports, and common style violations
#     2. Structural tests — runs all 44 pytest tests that validate the DAG's
#                           structure, scheduling config, task graph, and
#                           operator types without requiring Docker or a live
#                           Airflow instance
#
# Caching
# -------
# pip dependencies (including apache-airflow and all its transitive deps)
# are cached by the requirements.txt hash. Cache misses on requirements.txt
# changes only; subsequent runs on the same dependency set are fast.
#
# AIRFLOW_HOME
# ------------
# Set to /tmp/airflow so Airflow's first-import initialization (airflow.cfg,
# logs/) writes to a throwaway path rather than the runner's home directory.
# =============================================================================

name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    env:
      # Redirect Airflow's first-import setup to a temp directory.
      # Prevents airflow.cfg and SQLite db from being written to ~/airflow.
      AIRFLOW_HOME: /tmp/airflow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-airflow-2.10.2-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-airflow-2.10.2-

      # Install Airflow first using the official constraint file.
      # The constraint file pins every transitive dependency to a tested
      # combination, preventing resolver conflicts with Airflow's large
      # dependency tree.
      - name: Install Apache Airflow 2.10.2
        run: |
          pip install apache-airflow==2.10.2 \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.10.2/constraints-3.12.txt"

      # Install project dev dependencies (pytest, pytest-cov, ruff, python-dotenv).
      - name: Install project dependencies
        run: pip install -r requirements.txt

      # Ruff checks for syntax errors, undefined names, unused imports,
      # and pycodestyle violations. Fails the build on any finding.
      - name: Lint with ruff
        run: ruff check .

      # Run the full structural test suite. These tests validate the DAG's
      # Python object — no Docker, no database, no API keys required.
      - name: Run structural tests
        run: pytest tests/ -v
