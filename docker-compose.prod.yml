# =============================================================================
# data-orchestration-airflow — Production Docker Compose Overlay
# =============================================================================
#
# USAGE
# -----
# Apply on top of the base configuration:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file overrides only the settings that differ in production.
# The base docker-compose.yml remains unchanged and continues to work
# as-is for local development.
#
# WHAT THIS OVERLAY CHANGES
# -------------------------
# 1. Removes the host port binding on postgres-etl.
#    In production the ETL database is AWS RDS. Exposing the idle local
#    container on a host port is an unnecessary attack surface.
#
# 2. Injects AIRFLOW_ENV=production into all Airflow containers.
#    Task callables and config modules can read this to apply
#    environment-specific behaviour (stricter error handling, no
#    debug-level logging, etc.).
#
# AWS RDS CONFIGURATION
# ---------------------
# The ETL data layer uses AWS RDS (PostgreSQL) instead of the Docker
# postgres-etl container. Routing is controlled entirely via .env:
#
#   POSTGRES_ETL_HOST=<identifier>.<random>.us-east-1.rds.amazonaws.com
#
# Setting this variable causes both the Python ETL tasks (ETL_DATABASE_URL)
# and the dbt transformation layer (dbt/profiles.yml) to connect to RDS.
# No changes to this overlay file are required when switching hosts.
#
# The local postgres-etl container continues to start and pass its
# healthcheck (satisfying airflow-init's depends_on condition) but
# receives no connections when POSTGRES_ETL_HOST points to RDS.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # postgres-etl — Remove host port exposure in production.
  #
  # The ETL database host port (5433) is only needed for local development
  # inspection (psql, DBeaver, pgAdmin). In production the database is
  # accessed only from within the Docker/VPC network. Exposing it on a
  # host port in production is an unnecessary attack surface.
  #
  # `ports: []` replaces the base file's port binding with an empty list,
  # effectively removing the host-side mapping while keeping the container
  # reachable on port 5432 within the internal Docker network.
  # ---------------------------------------------------------------------------
  postgres-etl:
    ports: []

  # ---------------------------------------------------------------------------
  # Airflow services — Inject production environment flag.
  #
  # AIRFLOW_ENV is not an Airflow built-in. It is a convention available to
  # DAG callables and config modules via os.environ.get("AIRFLOW_ENV").
  # Use it to gate debug logging, relax/tighten retry policies, or select
  # environment-specific secrets backends.
  # ---------------------------------------------------------------------------
  airflow-init:
    environment:
      AIRFLOW_ENV: production

  airflow-webserver:
    environment:
      AIRFLOW_ENV: production

  airflow-scheduler:
    environment:
      AIRFLOW_ENV: production
